name: OCR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  ocr-review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/ocr review') &&
      github.event.comment.author_association == 'OWNER'
    steps:
      - name: Run OCR review
        uses: djangoyi-yunify/gh-action-bundles/actions/ocr-review@main
        with:
          llm-url: ${{ secrets.OCR_LLM_URL }}
          llm-token: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          llm-model: ${{ secrets.OCR_LLM_MODEL }}
          pr-number: ${{ github.event.issue.number }}
          rule-path: .github/ocr-inline-fallback-rule.json
          background: ${{ github.event.issue.title }}
